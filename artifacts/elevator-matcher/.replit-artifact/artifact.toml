kind = "web"
previewPath = "/"
title = "Elevator Cabin Matcher"
version = "1.0.0"
id = "artifacts/elevator-matcher"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22240

[services.development]
run = "pnpm --filter @workspace/elevator-matcher run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/elevator-matcher", "run", "build" ]
publicDir = "artifacts/elevator-matcher/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22240"
BASE_PATH = "/"
