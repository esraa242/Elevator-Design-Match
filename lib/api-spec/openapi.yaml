openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: cabins
    description: Elevator cabin design operations
  - name: analysis
    description: AI interior analysis and matching
  - name: leads
    description: Lead capture operations
  - name: Storage
    description: Object storage upload and serving endpoints.
paths:
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an uploaded object by path
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed with correct Content-Type.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /cabins:
    get:
      operationId: listCabins
      tags: [cabins]
      summary: List all cabin designs
      description: Returns all pre-stored elevator cabin designs
      responses:
        "200":
          description: List of cabin designs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CabinDesign"

  /cabins/{id}:
    get:
      operationId: getCabin
      tags: [cabins]
      summary: Get a specific cabin design
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cabin design details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CabinDesign"
        "404":
          description: Cabin not found

  /analysis/match:
    post:
      operationId: analyzeAndMatch
      tags: [analysis]
      summary: Analyze interior image and match to cabin designs
      description: Accepts a base64-encoded interior image, uses AI to analyze the style, and returns matched cabin designs ranked by compatibility score
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeAndMatchBody"
      responses:
        "200":
          description: Analysis results with matched cabin designs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"
        "400":
          description: Invalid image or analysis failed

  /leads:
    post:
      operationId: createLead
      tags: [leads]
      summary: Create a lead record
      description: Captures user contact information and their matched cabin design for WhatsApp follow-up
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLeadBody"
      responses:
        "201":
          description: Lead created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "400":
          description: Validation error

  /leads/stats:
    get:
      operationId: getLeadStats
      tags: [leads]
      summary: Get lead statistics
      description: Returns aggregated lead data for analytics
      responses:
        "200":
          description: Lead statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadStats"

components:
  schemas:
    AnalyzeAndMatchBody:
      type: object
      properties:
        imageBase64:
          type: string
          description: Base64-encoded image data
        mimeType:
          type: string
          description: Image MIME type (e.g. image/jpeg, image/png)
          default: image/jpeg
      required:
        - imageBase64

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    CabinDesign:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          description: Name of the cabin design (e.g. "Modern Luxury Cabin")
        style:
          type: string
          description: Design style category (e.g. "Modern Luxury", "Classic", "Contemporary")
        description:
          type: string
        imageUrl:
          type: string
          description: URL to the cabin design image
        thumbnailUrl:
          type: string
          description: URL to a smaller thumbnail image
        specs:
          $ref: "#/components/schemas/CabinSpecs"
        tags:
          type: array
          items:
            type: string
          description: Style tags for matching (e.g. ["marble", "minimalist", "gold"])
      required:
        - id
        - name
        - style
        - description
        - imageUrl
        - thumbnailUrl
        - specs
        - tags

    CabinSpecs:
      type: object
      properties:
        ceiling:
          type: string
        wallPanels:
          type: string
        handrail:
          type: string
        flooring:
          type: string
        lighting:
          type: string
        capacity:
          type: string
        finish:
          type: string
        warranty:
          type: string
      required:
        - ceiling
        - wallPanels
        - handrail
        - flooring
        - lighting
        - capacity
        - finish
        - warranty

    AnalysisResult:
      type: object
      properties:
        interiorStyle:
          type: string
          description: AI-detected interior design style
        dominantColors:
          type: array
          items:
            type: string
          description: Detected dominant colors in the interior
        styleKeywords:
          type: array
          items:
            type: string
          description: Keywords describing the interior style
        matches:
          type: array
          items:
            $ref: "#/components/schemas/CabinMatch"
          description: Ranked list of matching cabin designs
      required:
        - interiorStyle
        - dominantColors
        - styleKeywords
        - matches

    CabinMatch:
      type: object
      properties:
        cabin:
          $ref: "#/components/schemas/CabinDesign"
        matchScore:
          type: integer
          minimum: 0
          maximum: 100
          description: Compatibility score from 0-100
        matchReason:
          type: string
          description: AI explanation for why this cabin matches the interior
      required:
        - cabin
        - matchScore
        - matchReason

    CreateLeadBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
          description: WhatsApp phone number
        cabinId:
          type: integer
          description: The matched cabin design ID
        matchScore:
          type: integer
      required:
        - name
        - phone
        - cabinId
        - matchScore

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
          description: Original file name.
        size:
          type: integer
          minimum: 1
          description: File size in bytes.
        contentType:
          type: string
          minLength: 1
          description: MIME type of the file (e.g. image/jpeg).
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
          description: Presigned GCS URL for PUT upload.
        objectPath:
          type: string
          description: Normalized object path. Store this in your database.
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    Lead:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        cabinId:
          type: integer
        matchScore:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - phone
        - cabinId
        - matchScore
        - createdAt

    LeadStats:
      type: object
      properties:
        totalLeads:
          type: integer
        leadsThisWeek:
          type: integer
        topCabin:
          type: string
        averageMatchScore:
          type: number
      required:
        - totalLeads
        - leadsThisWeek
        - topCabin
        - averageMatchScore
